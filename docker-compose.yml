services:
  app:
    build: .
    container_name: slowloris-dashboard
    working_dir: /var/www/html
    ports:
      - "8000:8000"
    volumes:
      - ./:/var/www/html
    environment:
      APP_ENV: local
      UPLOAD_MAX_SIZE_MB: 1024
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: slowloris_lab
      DB_USERNAME: slowloris
      DB_PASSWORD: secret
    depends_on:
      mysql:
        condition: service_healthy
    command: >
      sh -c "php -d upload_max_filesize=1024M -d post_max_size=1024M -d memory_limit=2048M
      artisan migrate --force &&
      php -d upload_max_filesize=1024M -d post_max_size=1024M -d memory_limit=2048M
      artisan db:seed --force &&
      php -d upload_max_filesize=1024M -d post_max_size=1024M -d memory_limit=2048M
      artisan serve --host=0.0.0.0 --port=8000"

  mysql:
    image: mysql:8.4
    container_name: slowloris-mysql
    environment:
      MYSQL_DATABASE: slowloris_lab
      MYSQL_USER: slowloris
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: rootsecret
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-prootsecret"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  mysql-data:
